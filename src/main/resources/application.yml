server:
  port: 8080

spring:
  application:
    name: yotoo-mcp
  ai:
    mcp:
      server:
        enabled: true                 # 显式启用 MCP 服务器 (默认就是true)
        name: yotoo-mcp-server   # 给你的服务器起个名字
        version: 1.0.0
        type: SYNC                     # 使用同步服务器，与你的代码一致
        sse-message-endpoint: /mcp/message  # 客户端发送消息的端点
        # 确保工具功能是开启的
        capabilities:
          tool: true
        # 确保工具变更通知功能开启 (默认就是true)
        tool-change-notification: true
      # 模拟API调用
      simulate-invoke: false

api:
  gateway: 192.168.31.132:8080
  cache:
    db:
      url: ${API_CACHE_DB_URL:jdbc:mysql://192.168.31.162:3306/jservices_agent?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2b8}
      username: ${API_CACHE_DB_USERNAME:jservices}
      password: ${API_CACHE_DB_PASSWORD:jservices}
    refresh:
      enabled: ${API_CACHE_REFRESH_ENABLED:true}
      cron: ${API_CACHE_REFRESH_CRON:0 */30 * * * *}